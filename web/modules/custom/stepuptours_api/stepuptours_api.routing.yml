stepuptours_api.site_settings:
  path: '/api/site-settings'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\SiteSettingsController::get'
  methods: [GET, OPTIONS]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

stepuptours_api.ranking:
  path: '/api/ranking'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\RankingController::ranking'
  methods: [GET, OPTIONS]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

stepuptours_api.user_register:
  path: '/api/user/register'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\UserRegisterController::register'
  methods: [POST, OPTIONS]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

stepuptours_api.me:
  path: '/api/me'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\MeController::get'
    _format: 'json'
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    _auth:
      - basic_auth
      - cookie

stepuptours_api.site_settings_update:
  path: '/api/site-settings'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\SiteSettingsController::update'
  methods: [PUT]
  requirements:
    _user_is_logged_in: 'TRUE'
  options:
    no_cache: TRUE
    _auth:
      - basic_auth
      - cookie

stepuptours_api.admin_languages:
  path: '/api/admin/languages'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\TranslationsController::languages'
  methods: [GET, OPTIONS]
  requirements:
    _access: 'TRUE'
  options:
    no_cache: TRUE

stepuptours_api.admin_translations_get:
  path: '/api/admin/translations/{langcode}'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\TranslationsController::getTranslations'
  methods: [GET, OPTIONS]
  requirements:
    _user_is_logged_in: 'TRUE'
    langcode: '[a-z]{2,5}'
  options:
    no_cache: TRUE
    _auth:
      - basic_auth
      - cookie

stepuptours_api.admin_translations_save:
  path: '/api/admin/translations/{langcode}'
  defaults:
    _controller: '\Drupal\stepuptours_api\Controller\TranslationsController::saveTranslations'
  methods: [PUT]
  requirements:
    _user_is_logged_in: 'TRUE'
    langcode: '[a-z]{2,5}'
  options:
    no_cache: TRUE
    _auth:
      - basic_auth
      - cookie

